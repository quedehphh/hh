<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QUEDE Studio 护航工作室点单系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Microsoft YaHei', sans-serif; }
    body { background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .container { max-width: 1100px; width: 100%; background: rgba(20,20,40,0.9); backdrop-filter: blur(20px); border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); padding: 30px; color: #e0e0ff; border: 1px solid rgba(100,100,255,0.2); }
    
    h1 { text-align: center; color: #c0c0ff; margin-bottom: 10px; font-size: 2.2em; }
    .subtitle { text-align: center; color: #8080cc; margin-bottom: 30px; }
    
    input, select { padding: 10px 15px; background: rgba(10,10,30,0.8); border: 1px solid rgba(100,100,255,0.3); border-radius: 5px; font-size: 14px; color: #e0e0ff; outline: none; }
    input:focus { border-color: #6c6cff; box-shadow: 0 0 10px rgba(108,108,255,0.3); }
    input::placeholder { color: #6060aa; }
    
    .btn { padding: 10px 20px; background: #6c6cff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
    .btn:hover { background: #8080ff; transform: translateY(-1px); box-shadow: 0 5px 15px rgba(108,108,255,0.4); }
    .btn-small { padding: 5px 15px; font-size: 12px; }
    .btn-danger { background: #ff4757; }
    .btn-success { background: #00cc88; }
    
    .auth-box { background: rgba(30,30,60,0.6); padding: 20px; border-radius: 10px; margin-bottom: 20px; }
    .auth-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .auth-tab { padding: 10px 20px; border: 1px solid rgba(100,100,255,0.3); background: transparent; color: #b0b0ff; cursor: pointer; border-radius: 5px; font-weight: bold; }
    .auth-tab.active { background: #6c6cff; color: white; border-color: #6c6cff; }
    .auth-form { display: none; gap: 10px; align-items: center; flex-wrap: wrap; }
    .auth-form.active { display: flex; }
    
    .main-app { display: none; }
    .main-app.active { display: block; }
    .user-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab-btn { padding: 10px 20px; background: rgba(30,30,60,0.6); border: 1px solid rgba(100,100,255,0.2); color: #b0b0ff; cursor: pointer; border-radius: 5px; font-weight: bold; }
    .tab-btn.active { background: #6c6cff; color: white; border-color: #6c6cff; }
    
    .panel { display: none; animation: fadeIn 0.3s; }
    .panel.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .dish-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
    .dish-card { background: rgba(40,40,80,0.5); border: 1px solid rgba(100,100,255,0.2); border-radius: 10px; padding: 20px; transition: all 0.3s; }
    .dish-card:hover { border-color: #6c6cff; box-shadow: 0 5px 15px rgba(108,108,255,0.2); transform: translateY(-2px); }
    .dish-name { font-weight: bold; font-size: 18px; color: #c0c0ff; margin-bottom: 5px; }
    .dish-price { color: #00cc88; font-weight: bold; font-size: 22px; margin: 10px 0; }
    .dish-desc { color: #8080cc; font-size: 14px; margin-bottom: 10px; }
    
    .order-item { background: rgba(30,30,60,0.5); border: 1px solid rgba(100,100,255,0.15); border-radius: 10px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .badge { padding: 5px 12px; border-radius: 15px; font-size: 12px; font-weight: bold; white-space: nowrap; }
    .badge-pending { background: #ffeaa7; color: #d63031; }
    .badge-unpaid { background: #fab1a0; color: #d63031; }
    .badge-completed { background: #a8e6cf; color: #00b894; }
    
    .admin-section { background: rgba(30,30,60,0.5); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(100,100,255,0.2); }
    .admin-section h3 { color: #c0c0ff; margin-bottom: 15px; }
    
    .empty-state { text-align: center; padding: 40px; color: #6060aa; }
    .message { padding: 10px; border-radius: 5px; margin: 10px 0; }
    .message-error { background: rgba(255,71,87,0.1); color: #ff4757; border: 1px solid #ff4757; }
    .message-success { background: rgba(0,204,136,0.1); color: #00cc88; border: 1px solid #00cc88; }
    
    hr { border: none; border-top: 1px solid rgba(100,100,255,0.2); margin: 20px 0; }
    select { background: rgba(10,10,30,0.8); color: #e0e0ff; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛡️ QUEDE Studio</h1>
    <div class="subtitle">护航工作室 · 云端点单系统</div>

    <!-- 登录/注册 -->
    <div class="auth-box" id="authBox">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchAuth('login')">🔑 登录</button>
        <button class="auth-tab" onclick="switchAuth('register')">📝 注册</button>
      </div>
      <div class="auth-form active" id="loginForm">
        <input type="text" id="loginUser" placeholder="用户名">
        <input type="password" id="loginPass" placeholder="密码">
        <button class="btn" onclick="login()">登录</button>
      </div>
      <div class="auth-form" id="registerForm">
        <input type="text" id="regUser" placeholder="设置用户名(至少3位)">
        <input type="password" id="regPass" placeholder="设置密码(至少4位)">
        <button class="btn" onclick="register()">注册</button>
      </div>
      <div id="authMsg"></div>
    </div>

    <!-- 主界面 -->
    <div class="main-app" id="mainApp">
      <div class="user-bar">
        <div>
          👤 <span id="currentUser" style="color:#c0c0ff;"></span>
          <span id="adminBadge" style="display:none; color:#ffd700; margin-left:10px;">[管理员]</span>
        </div>
        <button class="btn btn-small" onclick="logout()">退出</button>
      </div>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchPanel('orderPanel')">📋 点单区</button>
        <button class="tab-btn" onclick="switchPanel('cartPanel')">🛒 购物车 <span id="cartCount" style="background:red; color:white; border-radius:50%; padding:2px 8px; font-size:12px; display:none;">0</span></button>
        <button class="tab-btn" onclick="switchPanel('myOrdersPanel')">📦 我的订单</button>
        <button class="tab-btn" onclick="switchPanel('adminPanel')" id="adminTab" style="display:none;">⚙️ 管理</button>
      </div>

      <!-- 点单区 -->
      <div class="panel active" id="orderPanel">
        <div class="dish-grid" id="dishGrid"></div>
      </div>

      <!-- 购物车 -->
      <div class="panel" id="cartPanel">
        <div id="cartItems"><div class="empty-state">购物车是空的</div></div>
        <div style="margin-top:20px; font-size:20px; font-weight:bold; color:#00cc88;" id="cartTotal"></div>
        <button class="btn btn-success" onclick="submitOrder()" style="margin-top:15px;" id="btnSubmit" disabled>📤 提交订单</button>
      </div>

      <!-- 我的订单 -->
      <div class="panel" id="myOrdersPanel">
        <div id="myOrders"><div class="empty-state">暂无订单</div></div>
      </div>

      <!-- 后台管理 -->
      <div class="panel" id="adminPanel">
        <div class="admin-section">
          <h3>➕ 添加服务</h3>
          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <input type="text" id="dishName" placeholder="服务名称">
            <input type="number" id="dishPrice" placeholder="价格" step="0.01">
            <input type="text" id="dishDesc" placeholder="描述(选填)">
            <button class="btn" onclick="addDish()">添加</button>
          </div>
        </div>
        <div class="admin-section">
          <h3>📋 服务管理</h3>
          <div id="adminDishes"></div>
        </div>
        <div class="admin-section">
          <h3>👥 用户审核</h3>
          <div id="adminUsers"></div>
        </div>
        <div class="admin-section">
          <h3>📦 所有订单</h3>
          <div id="adminOrders"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ============ 配置区 - 改成你自己的信息 ============
    const GITEE_TOKEN = '4a115efe6c57c0b7947746993a759689';
    const REPO_OWNER = 'syqdsg';
    const REPO_NAME = 'quedehh';
    
    const GITEE_API = 'https://gitee.com/api/v5';
    
    // ============ 全局状态 ============
    let currentUser = null;
    let cart = [];
    let cachedData = { users: [], dishes: [], orders: [] };

    // ============ 数据读写 ============
    async function apiRequest(method, path, body = null) {
      const url = `${GITEE_API}/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`;
      const headers = {
        'Authorization': `token ${GITEE_TOKEN}`,
        'Content-Type': 'application/json'
      };

      const options = { method, headers };
      if (body) options.body = JSON.stringify(body);

      const response = await fetch(url, options);
      if (!response.ok) {
        const error = await response.json().catch(() => ({}));
        throw new Error(error.message || `请求失败 (${response.status})`);
      }
      return response.json();
    }

    async function readFile(filename) {
      try {
        const data = await apiRequest('GET', filename);
        const content = decodeURIComponent(escape(atob(data.content)));
        return { data: JSON.parse(content), sha: data.sha };
      } catch (e) {
        if (e.message.includes('404')) {
          // 文件不存在，初始化
          return null;
        }
        throw e;
      }
    }

    async function writeFile(filename, content, sha = null) {
      const body = {
        access_token: GITEE_TOKEN,
        content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))),
        message: `更新 ${filename}`
      };
      if (sha) body.sha = sha;
      return apiRequest('PUT', filename, body);
    }

    async function loadData() {
      try {
        // 初始化文件如果不存在
        await initIfNeeded();
        
        const [usersResult, dishesResult, ordersResult] = await Promise.all([
          readFile('accounts.json'),
          readFile('dishes.json'),
          readFile('orders.json')
        ]);
        
        cachedData = {
          users: usersResult?.data?.users || [],
          dishes: dishesResult?.data?.dishes || [],
          orders: ordersResult?.data?.orders || []
        };
        
        console.log('数据加载成功', cachedData);
      } catch (e) {
        console.error('数据加载失败:', e);
        showMessage('authMsg', '数据加载失败: ' + e.message, '#ff4757');
      }
    }

    async function initIfNeeded() {
      // 检查并创建accounts.json
      const accountsResult = await readFile('accounts.json');
      if (!accountsResult) {
        await writeFile('accounts.json', {
          users: [{
            id: 'admin001',
            username: 'admin',
            password: 'admin123',
            role: 'admin',
            status: 'approved'
          }]
        });
      }
      
      // 检查并创建dishes.json
      const dishesResult = await readFile('dishes.json');
      if (!dishesResult) {
        await writeFile('dishes.json', {
          dishes: [
            { id: 'd001', name: '品牌Logo设计', price: 500, desc: '含3版修改', available: true },
            { id: 'd002', name: '海报设计', price: 300, desc: '活动海报设计', available: true },
            { id: 'd003', name: 'UI界面设计', price: 2000, desc: '移动端/网页端', available: true },
            { id: 'd004', name: '品牌VI手册', price: 5000, desc: '完整VI系统', available: true }
          ]
        });
      }
      
      // 检查并创建orders.json
      const ordersResult = await readFile('orders.json');
      if (!ordersResult) {
        await writeFile('orders.json', { orders: [] });
      }
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
    }

    function showMessage(id, text, color) {
      const el = document.getElementById(id);
      if (!el) return;
      el.innerHTML = `<div class="message" style="color:${color}; border-color:${color};">${text}</div>`;
      setTimeout(() => { if (el) el.innerHTML = ''; }, 3000);
    }

    // ============ 认证 ============
    function switchAuth(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById(tab === 'login' ? 'loginForm' : 'registerForm').classList.add('active');
    }

    async function login() {
      const username = document.getElementById('loginUser').value.trim();
      const password = document.getElementById('loginPass').value.trim();

      if (!username || !password) {
        showMessage('authMsg', '请填写用户名和密码', '#ff4757');
        return;
      }

      if (cachedData.users.length === 0) await loadData();
      
      const user = cachedData.users.find(u => u.username === username);
      if (!user) {
        showMessage('authMsg', '用户不存在', '#ff4757');
        return;
      }
      if (user.status === 'pending') {
        showMessage('authMsg', '账户未审核，请等待管理员审核', '#ffa500');
        return;
      }
      if (user.password !== password) {
        showMessage('authMsg', '密码错误', '#ff4757');
        return;
      }

      loginSuccess(user);
    }

    async function register() {
      const username = document.getElementById('regUser').value.trim();
      const password = document.getElementById('regPass').value.trim();

      if (!username || !password) {
        showMessage('authMsg', '请填写用户名和密码', '#ff4757');
        return;
      }
      if (username.length < 3) {
        showMessage('authMsg', '用户名至少3个字符', '#ff4757');
        return;
      }
      if (password.length < 4) {
        showMessage('authMsg', '密码至少4个字符', '#ff4757');
        return;
      }

      if (cachedData.users.length === 0) await loadData();
      
      if (cachedData.users.find(u => u.username === username)) {
        showMessage('authMsg', '用户名已存在', '#ff4757');
        return;
      }

      cachedData.users.push({
        id: generateId(),
        username,
        password,
        role: 'user',
        status: 'pending'
      });

      try {
        const result = await readFile('accounts.json');
        await writeFile('accounts.json', { users: cachedData.users }, result?.sha);
        showMessage('authMsg', '✅ 注册成功，请等待审核', '#00cc88');
        document.getElementById('regUser').value = '';
        document.getElementById('regPass').value = '';
      } catch (e) {
        // 回滚
        cachedData.users.pop();
        showMessage('authMsg', '注册失败: ' + e.message, '#ff4757');
      }
    }

    function loginSuccess(user) {
      currentUser = user;
      document.getElementById('authBox').style.display = 'none';
      document.getElementById('mainApp').classList.add('active');
      document.getElementById('currentUser').textContent = user.username;
      
      if (user.role === 'admin') {
        document.getElementById('adminBadge').style.display = 'inline';
        document.getElementById('adminTab').style.display = 'inline-block';
      }
      
      refreshUI();
    }

    function logout() {
      currentUser = null;
      cart = [];
      document.getElementById('authBox').style.display = 'block';
      document.getElementById('mainApp').classList.remove('active');
      document.getElementById('adminBadge').style.display = 'none';
      document.getElementById('adminTab').style.display = 'none';
    }

    // ============ 界面切换 ============
    function switchPanel(panelId) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById(panelId).classList.add('active');
      refreshPanel(panelId);
    }

    function refreshPanel(panelId) {
      switch(panelId) {
        case 'orderPanel': renderDishes(); break;
        case 'cartPanel': renderCart(); break;
        case 'myOrdersPanel': renderMyOrders(); break;
        case 'adminPanel': renderAdmin(); break;
      }
    }

    function refreshUI() {
      renderDishes();
      renderCart();
      renderMyOrders();
      if (currentUser?.role === 'admin') renderAdmin();
    }

    // ============ 点单区 ============
    function renderDishes() {
      const available = cachedData.dishes.filter(d => d.available !== false);
      const grid = document.getElementById('dishGrid');
      
      if (available.length === 0) {
        grid.innerHTML = '<div class="empty-state">暂无可用服务</div>';
        return;
      }

      grid.innerHTML = available.map(d => `
        <div class="dish-card">
          <div class="dish-name">${d.name}</div>
          <div class="dish-price">¥${d.price.toFixed(2)}</div>
          ${d.desc ? `<div class="dish-desc">${d.desc}</div>` : ''}
          <button class="btn btn-small" onclick="addToCart('${d.id}')">➕ 加入购物车</button>
        </div>
      `).join('');
    }

    function addToCart(dishId) {
      const dish = cachedData.dishes.find(d => d.id === dishId);
      if (!dish) return;

      const exist = cart.find(c => c.dishId === dishId);
      if (exist) {
        exist.quantity++;
      } else {
        cart.push({ dishId, name: dish.name, price: dish.price, quantity: 1 });
      }
      updateCartCount();
      alert(`已添加：${dish.name}`);
    }

    function updateCartCount() {
      const count = cart.reduce((sum, c) => sum + c.quantity, 0);
      const badge = document.getElementById('cartCount');
      badge.textContent = count;
      badge.style.display = count > 0 ? 'inline-block' : 'none';
    }

    // ============ 购物车 ============
    function renderCart() {
      const container = document.getElementById('cartItems');
      const totalEl = document.getElementById('cartTotal');
      const submitBtn = document.getElementById('btnSubmit');

      if (cart.length === 0) {
        container.innerHTML = '<div class="empty-state">购物车是空的</div>';
        totalEl.innerHTML = '';
        submitBtn.disabled = true;
        return;
      }

      const total = cart.reduce((s, c) => s + c.price * c.quantity, 0);
      container.innerHTML = cart.map((c, i) => `
        <div class="order-item">
          <div>
            <strong>${c.name}</strong>
            <div style="color:#8080cc;">¥${c.price.toFixed(2)} x ${c.quantity}</div>
          </div>
          <div>
            <button class="btn btn-small" onclick="changeQty(${i}, -1)">➖</button>
            <span style="margin:0 10px;">${c.quantity}</span>
            <button class="btn btn-small" onclick="changeQty(${i}, 1)">➕</button>
            <button class="btn btn-danger btn-small" onclick="removeItem(${i})">删除</button>
          </div>
        </div>
      `).join('');
      totalEl.innerHTML = `合计：¥${total.toFixed(2)}`;
      submitBtn.disabled = false;
    }

    function changeQty(index, delta) {
      cart[index].quantity += delta;
      if (cart[index].quantity <= 0) cart.splice(index, 1);
      updateCartCount();
      renderCart();
    }

    function removeItem(index) {
      cart.splice(index, 1);
      updateCartCount();
      renderCart();
    }

    async function submitOrder() {
      if (!currentUser || cart.length === 0) return;

      const order = {
        id: generateId(),
        userId: currentUser.id,
        username: currentUser.username,
        items: [...cart],
        total: cart.reduce((s, c) => s + c.price * c.quantity, 0),
        status: '已下单',
        createdAt: new Date().toISOString()
      };

      cachedData.orders.push(order);

      try {
        const result = await readFile('orders.json');
        await writeFile('orders.json', { orders: cachedData.orders }, result?.sha);
        cart = [];
        updateCartCount();
        refreshUI();
        alert('✅ 订单已提交！');
        switchPanel('myOrdersPanel');
        document.querySelectorAll('.tab-btn')[2].classList.add('active');
      } catch (e) {
        cachedData.orders.pop();
        alert('提交失败: ' + e.message);
      }
    }

    // ============ 我的订单 ============
    function renderMyOrders() {
      if (!currentUser) return;
      
      const myOrders = cachedData.orders
        .filter(o => o.userId === currentUser.id)
        .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

      const container = document.getElementById('myOrders');
      if (myOrders.length === 0) {
        container.innerHTML = '<div class="empty-state">暂无订单</div>';
        return;
      }

      container.innerHTML = myOrders.map(o => {
        const badgeClass = o.status === '已下单' ? 'badge-pending' : 
                          o.status === '未支付' ? 'badge-unpaid' : 'badge-completed';
        const items = o.items.map(i => `${i.name} x${i.quantity}`).join(', ');
        return `
          <div class="order-item">
            <div>
              <strong>${items}</strong>
              <div style="color:#8080cc;">¥${o.total.toFixed(2)} · ${new Date(o.createdAt).toLocaleString()}</div>
            </div>
            <span class="badge ${badgeClass}">${o.status}</span>
          </div>
        `;
      }).join('');
    }

    // ============ 后台管理 ============
    function renderAdmin() {
      if (!currentUser || currentUser.role !== 'admin') return;
      
      // 菜品管理
      document.getElementById('adminDishes').innerHTML = cachedData.dishes.map(d => `
        <div class="order-item">
          <div>
            <strong>${d.name}</strong> - ¥${d.price.toFixed(2)}
            ${d.available === false ? '<span style="color:#ff4757;">[已下架]</span>' : ''}
          </div>
          <div>
            <button class="btn btn-small" onclick="toggleDish('${d.id}')">
              ${d.available !== false ? '下架' : '上架'}
            </button>
            <button class="btn btn-danger btn-small" onclick="deleteDish('${d.id}')">删除</button>
          </div>
        </div>
      `).join('');

      // 用户审核
      document.getElementById('adminUsers').innerHTML = cachedData.users.map(u => `
        <div class="order-item">
          <div>
            <strong>${u.username}</strong> 
            <span style="color:#8080cc;">[${u.role}] - ${u.status}</span>
          </div>
          <div>
            ${u.status === 'pending' ? 
              `<button class="btn btn-success btn-small" onclick="approveUser('${u.id}')">审核通过</button>` : ''}
            ${u.role !== 'admin' ? 
              `<button class="btn btn-danger btn-small" onclick="deleteUser('${u.id}')">删除</button>` : ''}
          </div>
        </div>
      `).join('');

      // 订单管理
      const sorted = [...cachedData.orders].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      document.getElementById('adminOrders').innerHTML = sorted.map(o => {
        const items = o.items.map(i => `${i.name} x${i.quantity}`).join(', ');
        return `
          <div class="order-item">
            <div>
              <strong>${o.username}:</strong> ${items}
              <div style="color:#8080cc;">¥${o.total.toFixed(2)} · ${new Date(o.createdAt).toLocaleString()}</div>
            </div>
            <div>
              <select onchange="updateOrderStatus('${o.id}', this.value)" style="padding:5px;">
                <option value="">修改状态</option>
                <option value="已下单" ${o.status === '已下单' ? 'selected' : ''}>已下单</option>
                <option value="未支付" ${o.status === '未支付' ? 'selected' : ''}>未支付</option>
                <option value="已完成" ${o.status === '已完成' ? 'selected' : ''}>已完成</option>
              </select>
            </div>
          </div>
        `;
      }).join('');
    }

    async function addDish() {
      const name = document.getElementById('dishName').value.trim();
      const price = parseFloat(document.getElementById('dishPrice').value);
      const desc = document.getElementById('dishDesc').value.trim();

      if (!name || isNaN(price)) {
        alert('请填写名称和价格');
        return;
      }

      cachedData.dishes.push({
        id: generateId(),
        name,
        price,
        desc,
        available: true
      });

      try {
        const result = await readFile('dishes.json');
        await writeFile('dishes.json', { dishes: cachedData.dishes }, result?.sha);
        document.getElementById('dishName').value = '';
        document.getElementById('dishPrice').value = '';
        document.getElementById('dishDesc').value = '';
        refreshUI();
        alert('✅ 添加成功');
      } catch (e) {
        cachedData.dishes.pop();
        alert('添加失败: ' + e.message);
      }
    }

    async function toggleDish(id) {
      const dish = cachedData.dishes.find(d => d.id === id);
      if (dish) {
        dish.available = dish.available === false ? true : false;
        try {
          const result = await readFile('dishes.json');
          await writeFile('dishes.json', { dishes: cachedData.dishes }, result?.sha);
          refreshUI();
        } catch (e) {
          dish.available = !dish.available;
          alert('操作失败: ' + e.message);
        }
      }
    }

    async function deleteDish(id) {
      if (!confirm('确定删除？')) return;
      const backup = [...cachedData.dishes];
      cachedData.dishes = cachedData.dishes.filter(d => d.id !== id);
      try {
        const result = await readFile('dishes.json');
        await writeFile('dishes.json', { dishes: cachedData.dishes }, result?.sha);
        refreshUI();
      } catch (e) {
        cachedData.dishes = backup;
        alert('删除失败: ' + e.message);
      }
    }

    async function approveUser(id) {
      const user = cachedData.users.find(u => u.id === id);
      if (user) {
        user.status = 'approved';
        try {
          const result = await readFile('accounts.json');
          await writeFile('accounts.json', { users: cachedData.users }, result?.sha);
          refreshUI();
        } catch (e) {
          user.status = 'pending';
          alert('操作失败: ' + e.message);
        }
      }
    }

    async function deleteUser(id) {
      if (!confirm('确定删除？')) return;
      const backup = [...cachedData.users];
      cachedData.users = cachedData.users.filter(u => u.id !== id);
      try {
        const result = await readFile('accounts.json');
        await writeFile('accounts.json', { users: cachedData.users }, result?.sha);
        refreshUI();
      } catch (e) {
        cachedData.users = backup;
        alert('删除失败: ' + e.message);
      }
    }

    async function updateOrderStatus(id, status) {
      if (!status) return;
      const order = cachedData.orders.find(o => o.id === id);
      if (order) {
        const oldStatus = order.status;
        order.status = status;
        try {
          const result = await readFile('orders.json');
          await writeFile('orders.json', { orders: cachedData.orders }, result?.sha);
          refreshUI();
        } catch (e) {
          order.status = oldStatus;
          alert('更新失败: ' + e.message);
        }
      }
    }

    // ============ 初始化 ============
    window.addEventListener('DOMContentLoaded', async () => {
      console.log('系统启动...');
      await loadData();
      console.log('初始化完成');
    });
  </script>
</body>
</html>
